<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none" role="img" aria-label="Rei das Vendas">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F2D38A"/>
      <stop offset="35%" stop-color="#D6A84F"/>
      <stop offset="75%" stop-color="#C4953A"/>
      <stop offset="100%" stop-color="#9A7209"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="50%" stop-color="#F2D38A"/>
      <stop offset="100%" stop-color="#C4953A"/>
    </linearGradient>
    <linearGradient id="textg" x1="0" y1="0" x2="320" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F2D38A"/>
      <stop offset="40%" stop-color="#D6A84F"/>
      <stop offset="100%" stop-color="#B88932"/>
    </linearGradient>
  </defs>
  <g transform="translate(0,8)">
    <!-- Crown points on top of R -->
    <path d="M10 20 L22 6 L34 20" stroke="url(#rg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Crown jewels -->
    <circle cx="22" cy="10" r="2.5" fill="url(#rg2)"/>
    <circle cx="12" cy="17" r="2" fill="url(#rg)"/>
    <circle cx="32" cy="17" r="2" fill="url(#rg)"/>
    <!-- R vertical stem -->
    <path d="M17 18 L17 46" stroke="url(#rg)" stroke-width="4" stroke-linecap="round"/>
    <!-- R bowl -->
    <path d="M17 18 Q32 15 33 26 Q34 37 17 36" stroke="url(#rg)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- R leg -->
    <path d="M27 34 L38 45" stroke="url(#rg)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Highlight -->
    <path d="M17 18 L17 46" stroke="url(#rg2)" stroke-width="1.4" stroke-linecap="round" opacity="0.4" transform="translate(-2,0)"/>
    <!-- Bowl inner highlight -->
    <path d="M19 19 Q30 17 30 26" stroke="url(#rg2)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- R > decorative separator -->
  <line x1="48" y1="32" x2="54" y2="32" stroke="url(#rg)" stroke-width="1.2" opacity="0.5"/>
  <!-- Text -->
  <text x="62" y="39" fill="url(#textg)" font-family="'Playfair Display', 'Cormorant Garamond', Georgia, serif" font-size="26" font-weight="700" letter-spacing="0.18em">REI DAS VENDAS</text>
</svg>
