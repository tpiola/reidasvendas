<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <style>
      .logo-icon { fill: white; }
      .logo-text { fill: white; font-family: 'Georgia', serif; }
      .logo-sub { fill: rgba(255,255,255,0.5); font-family: 'Arial', sans-serif; }
    </style>
  </defs>
  <!-- Crown icon -->
  <g transform="translate(4,4)">
    <!-- Crown base -->
    <rect x="2" y="30" width="40" height="6" rx="2" class="logo-icon"/>
    <!-- Crown peaks -->
    <polygon points="2,30 2,14 10,22 22,8 34,22 42,14 42,30" class="logo-icon"/>
    <!-- Crown gems -->
    <circle cx="22" cy="11" r="2.5" fill="#C9A84C"/>
    <circle cx="9" cy="22" r="1.8" fill="#C9A84C" opacity="0.8"/>
    <circle cx="35" cy="22" r="1.8" fill="#C9A84C" opacity="0.8"/>
  </g>
  <!-- Text: Rei das Vendas -->
  <text x="58" y="28" class="logo-text" font-size="22" font-weight="700" letter-spacing="-0.5">REI DAS VENDAS</text>
  <text x="59" y="46" class="logo-sub" font-size="9" letter-spacing="3">ENGENHARIA DE RESULTADOS</text>
</svg>
