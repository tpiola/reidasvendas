<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Theme -->
    <meta name="theme-color" content="#030303" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- SEO fallback (sobrescrito em runtime por seo.ts em cada página) -->
    <title>Rei das Vendas — A Solução Completa Digital para Líderes e Instituições</title>
    <meta name="description" content="Democratizando a Inteligência Artificial. Entregamos para o seu negócio a mesma tecnologia das maiores empresas do mundo, com foco em resultado real." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://reidasvendas.com/" />

    <!-- Open Graph -->
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rei das Vendas" />
    <meta property="og:title" content="Rei das Vendas — A Solução Completa Digital para Líderes e Instituições" />
    <meta property="og:description" content="Democratizando a Inteligência Artificial. Entregamos para o seu negócio a mesma tecnologia das maiores empresas do mundo, com foco em resultado real." />
    <meta property="og:url" content="https://reidasvendas.com/" />
    <meta property="og:image" content="https://reidasvendas.com/og-image.svg" />
    <meta property="og:image:alt" content="Rei das Vendas" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@reidasvendas" />
    <meta name="twitter:creator" content="@thiagopiola" />
    <meta name="twitter:title" content="Rei das Vendas — A Solução Completa Digital para Líderes e Instituições" />
    <meta name="twitter:description" content="Democratizando a Inteligência Artificial. Entregamos para o seu negócio a mesma tecnologia das maiores empresas do mundo, com foco em resultado real." />
    <meta name="twitter:image" content="https://reidasvendas.com/og-image.svg" />

    <!-- Core Web Vitals: font preconnect antes do preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      />
    </noscript>

    <link rel="preload" href="/hero-slide-1.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="/hero.mp4" as="video" type="video/mp4" />

    <!-- Critical CSS inline: previne FOUC e melhora LCP -->
    <style>
      *,::before,::after{box-sizing:border-box}
      html{scroll-behavior:smooth;scrollbar-gutter:stable}
      body{margin:0;background-color:#030303;color:#fff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      #root{min-height:100dvh}
    </style>

    <!-- JSON-LD: Organization + WebSite + DigitalMarketingAgency (GEO-optimized) -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": ["Organization", "LocalBusiness", "DigitalMarketingAgency"],
      "@id": "https://reidasvendas.com/#organization",
      "name": "Rei das Vendas",
      "url": "https://reidasvendas.com/",
      "logo": "https://reidasvendas.com/favicon.svg",
      "email": "hello@reidasvendas.com",
      "description": "Democratizando a Inteligência Artificial. Engenharia de Crescimento e IA para Negócios Locais e Instituições.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Franca",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "-20.5383",
        "longitude": "-47.4008"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Brazil"
      },
      "priceRange": "$$"
    },
    {
      "@type": "WebSite",
      "@id": "https://reidasvendas.com/#website",
      "name": "Rei das Vendas",
      "url": "https://reidasvendas.com/",
      "inLanguage": "pt-BR",
      "publisher": {
        "@id": "https://reidasvendas.com/#organization"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://reidasvendas.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  ]
}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
