<!doctype html>

    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          document.documentElement.classList.add(
            t === 'light' || t === 'dark' ? t : matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          );
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
